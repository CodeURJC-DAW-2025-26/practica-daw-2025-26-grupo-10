<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editar Usuario</title>

    <link rel="icon" type="image/png" href="/images/TicketHub_icon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/main.css">
</head>

<body class="d-flex flex-column min-vh-100">

  {{>components/header_admin}}

  <main class="container my-5 flex-grow-1">
    <h2 class="text-center">Editar Usuario</h2>

    <form method="post" action="/admin/users/edit/{{client.id}}">
      <input type="hidden" name="_csrf" value="{{token}}">

      <p class="fw-bold mb-1">Nombre</p>
      <input name="name" class="form-control mb-3" value="{{client.name}}" placeholder="Nombre" required>

      <p class="fw-bold mb-1">Apellido</p>
      <input name="surname" class="form-control mb-3" value="{{client.surname}}" placeholder="Apellido" required>

      <p class="fw-bold mb-1">Email</p>
      <input type="email" name="email" class="form-control mb-3" value="{{client.email}}" placeholder="Email" required>

      <div class="d-flex gap-3 mt-3">
        <a href="/admin/users" class="btn btn-outline-primary flex-fill">Cancelar</a>
        <button type="submit" class="btn btn-primary flex-fill">Guardar cambios</button>
      </div>
    </form>
  </main>

  {{>components/footer_admin}}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
