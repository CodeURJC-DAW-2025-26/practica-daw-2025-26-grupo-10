services:
  db:
    image: mysql:8.0
    container_name: tickethub-db
    restart: always
    environment:
      MYSQL_DATABASE: tickethub_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user_tickethub
      MYSQL_PASSWORD: pass_tickethub
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    image: ${DOCKER_USER}/tickethub-app:latest
    container_name: tickethub-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8443:8443"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/tickethub_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=user_tickethub
      - SPRING_DATASOURCE_PASSWORD=pass_tickethub
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.MySQLDialect
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    restart: on-failure